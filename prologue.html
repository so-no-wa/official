<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大切な人に対する想いの環 - 想の環</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="prologue.css">
</head>
<body>
     <!-- ヘッダー読み込み -->
  <div id="header-placeholder"></div>
    <main class="prologue">
    
<section>
    <h1>大切な人に対する想いの環</h1>

    <p><span class="highlight">言葉では伝えきれない気持ち</span>がある。<br>
    でも、伝えたい気持ちは確かにそこにある。</p>

    <p>「想の環」は、<br>
    そんな<span class="highlight">“かたちのない想い”</span>を、<br>
    silverや天然石にそっと込めたアクセサリーです。</p>

    <p>誰かに手渡すために。<br>
    あるいは、自分の中に残すために。</p>

    <p><span class="highlight">言葉とは違う温度</span>で、<br>
    想いが伝わる瞬間がきっとあると、信じています。</p>
</section>

</main>

<!-- フッター読み込み -->
<div id="footer-placeholder"></div>
<!-- 共通スクリプト -->
<script>
    fetch("header.html")
      .then(res => res.text())
      .then(data => document.getElementById("header-placeholder").innerHTML = data);

    fetch("footer.html")
      .then(res => res.text())
      .then(data => document.getElementById("footer-placeholder").innerHTML = data);
  </script>
<script>
  Promise.all([
    fetch("header.html").then(res => res.text()),
    fetch("footer.html").then(res => res.text())
  ]).then(([header, footer]) => {
    document.getElementById("header-placeholder").innerHTML = header;
    document.getElementById("footer-placeholder").innerHTML = footer;

    const script = document.createElement("script");
    script.src = "script.js";
    document.body.appendChild(script);
  });
</script>

</body>
</html>
